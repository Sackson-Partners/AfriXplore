name: AfriXplore CI

on:
  push:
    branches: [main, 'week*/**', 'audit/**', 'fix/**', 'feat/**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.x'

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1: Install & cache
  # ──────────────────────────────────────────────────────────
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            **/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

  # ──────────────────────────────────────────────────────────
  # JOB 2: Code quality — TypeScript + ESLint + console.log check
  # ──────────────────────────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            **/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - run: pnpm install --frozen-lockfile

      - name: Build shared packages (required by typecheck)
        run: pnpm --filter "@afrixplore/telemetry" --filter "@afrixplore/config" --filter "@afrixplore/health" --filter "@afrixplore/auth" --filter "@afrixplore/types" run build

      - name: TypeScript — all services and apps
        run: pnpm run typecheck --recursive --if-present

      - name: ESLint — all services and apps
        run: pnpm run lint --recursive --if-present

      - name: Check for console.log in services
        run: |
          if grep -rn "console\.log\|console\.error\|console\.warn" \
              services/ --include="*.ts" \
              --exclude-dir=node_modules \
              --exclude-dir=dist; then
            echo "::error::console.log found in services — use structured logging via @afrixplore/telemetry"
            exit 1
          fi
          echo "No console.log in services"

      - name: Check for hardcoded secrets
        run: |
          if grep -rEi \
              '(subscription.?key|api.?key|secret|password)\s*[=:]\s*["\x27][^"'\''$\{]{12,}' \
              services/ apps/ \
              --include="*.ts" --include="*.js" \
              --exclude-dir=node_modules --exclude-dir=dist; then
            echo "::error::Possible hardcoded secret detected"
            exit 1
          fi
          echo "No hardcoded secrets detected"

  # ──────────────────────────────────────────────────────────
  # JOB 3: Security audit
  # ──────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Dependency vulnerability audit
        run: pnpm audit --audit-level=high

      - name: Verify .env files are not committed
        run: |
          committed=$(git ls-files | grep -E '\.env$|\.env\.local$|\.env\.production$|\.env\.staging$' || true)
          if [ -n "$committed" ]; then
            echo "::error::Committed .env file detected: $committed"
            exit 1
          fi
          echo "No .env files committed"

  # ──────────────────────────────────────────────────────────
  # JOB 4: Tests with coverage
  # ──────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            **/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: |
          pnpm run test --recursive --if-present -- \
            --coverage \
            --coverageReporters=text \
            --coverageReporters=lcov \
            --passWithNoTests

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: '**/coverage/lcov.info'
          fail_ci_if_error: false

  # ──────────────────────────────────────────────────────────
  # JOB 5: Build all services and apps
  # ──────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            **/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - run: pnpm install --frozen-lockfile

      - name: Build all packages and services
        run: pnpm run build --recursive --if-present

      - name: Build frontend apps
        run: |
          pnpm --filter platform-web run build
          pnpm --filter admin-web run build
        env:
          NEXT_PUBLIC_AZURE_CLIENT_ID: ${{ vars.NEXT_PUBLIC_AZURE_CLIENT_ID }}
          NEXT_PUBLIC_AZURE_TENANT_ID: ${{ vars.NEXT_PUBLIC_AZURE_TENANT_ID }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}

  # ──────────────────────────────────────────────────────────
  # JOB 6: Docker build validation (no push — CI only)
  # ──────────────────────────────────────────────────────────
  docker:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        service:
          - intelligence-api
          - scout-api
          - msim-api
          - payment-service
          - ai-inference
          - notification-service
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image (validate only — no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: afrixplore/${{ matrix.service }}:ci-${{ github.sha }}

  # ──────────────────────────────────────────────────────────
  # JOB 7: E2E Tests (staging only)
  # ──────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter platform-web exec playwright install chromium --with-deps

      - name: Run E2E tests
        run: pnpm --filter platform-web exec playwright test
        env:
          E2E_BASE_URL: ${{ vars.PLATFORM_WEB_STAGING_URL }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/platform-web/playwright-report/
          retention-days: 7
