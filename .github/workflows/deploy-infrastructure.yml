name: Deploy Infrastructure — AfriXplore

on:
  push:
    branches: [main, staging]
    paths:
      - 'infrastructure/bicep/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, staging, production]

jobs:
  deploy-bicep:
    name: Deploy Bicep (${{ inputs.environment || (github.ref_name == 'main' && 'production') || 'staging' }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || (github.ref_name == 'main' && 'production') || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets[format('AZURE_CREDENTIALS_{0}', upper(inputs.environment || (github.ref_name == 'main' && 'production') || 'staging'))] }}

      - name: Set environment variables
        run: |
          ENV="${{ inputs.environment || (github.ref_name == 'main' && 'production') || 'staging' }}"
          echo "DEPLOY_ENV=$ENV" >> $GITHUB_ENV
          echo "RG=rg-afrixplore-${ENV}-southafricanorth" >> $GITHUB_ENV

      - name: Bicep What-If
        run: |
          az deployment group what-if \
            --resource-group ${{ env.RG }} \
            --template-file infrastructure/bicep/main.bicep \
            --parameters infrastructure/bicep/environments/${{ env.DEPLOY_ENV }}.bicepparam

      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group ${{ env.RG }} \
            --template-file infrastructure/bicep/main.bicep \
            --parameters infrastructure/bicep/environments/${{ env.DEPLOY_ENV }}.bicepparam \
            --name "deploy-$(date +%Y%m%d-%H%M%S)"
