name: Deploy Infrastructure — AfriXplore

on:
  push:
    branches: [main, staging]
    paths:
      - 'infrastructure/bicep/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, staging, production]

jobs:
  deploy-bicep:
    name: Deploy Bicep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [ -n "${{ inputs.environment }}" ]; then
            ENV="${{ inputs.environment }}"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            ENV="production"
          else
            ENV="staging"
          fi
          echo "name=$ENV" >> $GITHUB_OUTPUT

          # Resource group per environment
          if [ "$ENV" = "production" ]; then
            echo "rg=rg-afrixplore-production-southafricanorth" >> $GITHUB_OUTPUT
          else
            echo "rg=afrixplore-rg" >> $GITHUB_OUTPUT
          fi

      - name: Azure Login (staging / dev)
        if: steps.env.outputs.name != 'production'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_STAGING }}

      - name: Azure Login (production)
        if: steps.env.outputs.name == 'production'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_PRODUCTION }}

      - name: Bicep What-If
        run: |
          az deployment group what-if \
            --resource-group "${{ steps.env.outputs.rg }}" \
            --template-file infrastructure/bicep/main.bicep \
            --parameters "infrastructure/bicep/environments/${{ steps.env.outputs.name }}.bicepparam"

      - name: Deploy Bicep
        run: |
          DEPLOY_NAME="deploy-$(date +%Y%m%d-%H%M%S)"
          # Use --no-wait to avoid ARM timing out on Container App revision health checks.
          # Container Apps with placeholder images can take >5m to pass health probes,
          # which exceeds the ARM operation timeout — but the apps ARE running.
          az deployment group create \
            --resource-group "${{ steps.env.outputs.rg }}" \
            --template-file infrastructure/bicep/main.bicep \
            --parameters "infrastructure/bicep/environments/${{ steps.env.outputs.name }}.bicepparam" \
            --name "$DEPLOY_NAME" \
            --no-wait
          echo "Deployment $DEPLOY_NAME submitted (async). Waiting 90s..."
          sleep 90

      - name: Verify infrastructure healthy
        run: |
          echo "=== Container Apps ==="
          az containerapp list \
            --resource-group "${{ steps.env.outputs.rg }}" \
            --query "[].{name:name, state:properties.runningStatus}" \
            --output table
          COUNT=$(az containerapp list \
            --resource-group "${{ steps.env.outputs.rg }}" \
            --query "length([?properties.runningStatus=='Running'])" \
            --output tsv 2>/dev/null || echo "0")
          echo "Running container apps: $COUNT"
          [ "$COUNT" -gt "0" ] && echo "OK" || { echo "No running container apps"; exit 1; }
