name: Provision Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, staging, prod]
      confirm:
        description: 'Type "yes" to confirm infrastructure changes'
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  provision:
    name: Provision ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    if: inputs.confirm == 'yes'
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group
        run: |
          az group create \
            --name "rg-ain-${{ inputs.environment }}" \
            --location southafricanorth \
            --output none

      - name: Validate Bicep template
        run: |
          az deployment group validate \
            --resource-group "rg-ain-${{ inputs.environment }}" \
            --template-file infra/main.bicep \
            --parameters @infra/parameters.${{ inputs.environment }}.json \
            --parameters \
              entraExternalTenantId="${{ secrets.AZURE_ENTRA_TENANT_ID }}" \
              entraClientId="${{ secrets.AZURE_ENTRA_CLIENT_ID }}" \
              postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}"

      - name: Deploy Bicep template
        id: deploy
        run: |
          OUTPUTS=$(az deployment group create \
            --resource-group "rg-ain-${{ inputs.environment }}" \
            --template-file infra/main.bicep \
            --parameters @infra/parameters.${{ inputs.environment }}.json \
            --parameters \
              entraExternalTenantId="${{ secrets.AZURE_ENTRA_TENANT_ID }}" \
              entraClientId="${{ secrets.AZURE_ENTRA_CLIENT_ID }}" \
              postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}" \
            --query properties.outputs \
            --output json)

          echo "acr_server=$(echo $OUTPUTS | jq -r '.acrLoginServer.value')" >> "$GITHUB_OUTPUT"
          echo "api_fqdn=$(echo $OUTPUTS | jq -r '.containerAppFqdn.value')" >> "$GITHUB_OUTPUT"

      - name: Store AI Search key in Key Vault
        if: secrets.AZURE_AI_SEARCH_KEY != ''
        run: |
          az keyvault secret set \
            --vault-name "kv-ain-${{ inputs.environment }}" \
            --name ain-search-key \
            --value "${{ secrets.AZURE_AI_SEARCH_KEY }}" \
            --output none

      - name: Summary
        run: |
          echo "## Provisioning Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "| Resource | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| ACR | ${{ steps.deploy.outputs.acr_server }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| API FQDN | ${{ steps.deploy.outputs.api_fqdn }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Next:** Push to \`develop\` to trigger the first staging deploy." >> "$GITHUB_STEP_SUMMARY"
