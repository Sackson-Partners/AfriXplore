name: Deploy Production (Blue-Green)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to deploy (e.g., v1.2.3)'
        required: true
        type: string
      traffic_percentage:
        description: 'Initial traffic percentage (10, 25, 50, 100)'
        required: false
        default: '10'
        type: choice
        options:
          - '10'
          - '25'
          - '50'
          - '100'

permissions:
  id-token: write
  contents: read
  deployments: write

env:
  ACR: cracaindev.azurecr.io  # Using dev ACR until production ACR is created
  RG_PROD: rg-afrixplore-msim-prod
  VERSION: ${{ inputs.version }}

jobs:
  validate:
    name: Validate Deployment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}

      - name: Validate version tag format
        run: |
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format. Expected: v1.2.3"
            exit 1
          fi
          echo "✅ Version tag valid: $VERSION"

      - name: Check if version exists
        run: |
          if ! git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "::error::Version tag $VERSION does not exist"
            exit 1
          fi
          echo "✅ Version tag exists"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Security audit
        run: |
          pnpm install
          ./scripts/security-audit.sh

  approve:
    name: Manual Approval
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://platform.ain-platform.com
    steps:
      - name: Deployment approved
        run: |
          echo "✅ Deployment to production approved for $VERSION"
          echo "   Traffic: ${{ inputs.traffic_percentage }}%"

  check-infrastructure:
    name: Check Production Infrastructure
    needs: approve
    runs-on: ubuntu-latest
    outputs:
      needs_provisioning: ${{ steps.check.outputs.needs_provisioning }}
    steps:
      - name: Azure login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Check if production Container Apps exist
        id: check
        run: |
          # Check if msim-api exists
          if az containerapp show --name ca-msim-api-prod --resource-group $RG_PROD 2>/dev/null; then
            echo "✅ Production infrastructure exists"
            echo "needs_provisioning=false" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Production infrastructure not found"
            echo "needs_provisioning=true" >> $GITHUB_OUTPUT
          fi

  provision-infrastructure:
    name: Provision Production Infrastructure
    needs: check-infrastructure
    if: needs.check-infrastructure.outputs.needs_provisioning == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy infrastructure with Bicep
        run: |
          echo "🏗️ Provisioning production infrastructure..."

          # Deploy main.bicep or use manual resource creation
          # This is a placeholder - adjust based on your Bicep templates

          az deployment group create \
            --resource-group $RG_PROD \
            --template-file infra/main.bicep \
            --parameters environment=prod \
            --mode Incremental || echo "⚠️ Bicep deployment skipped or failed"

          echo "✅ Infrastructure provisioning complete"

  backup:
    name: Backup Production Database
    needs: [check-infrastructure, provision-infrastructure]
    if: |
      always() &&
      (needs.check-infrastructure.result == 'success') &&
      (needs.provision-infrastructure.result == 'success' || needs.provision-infrastructure.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Azure login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create database backup
        run: |
          echo "📦 Creating production database backup..."
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          BACKUP_NAME="pre-deploy-$VERSION-$TIMESTAMP"

          # Find PostgreSQL server in production resource group
          PG_SERVER=$(az postgres flexible-server list \
            --resource-group $RG_PROD \
            --query "[0].name" -o tsv 2>/dev/null || echo "")

          if [ -n "$PG_SERVER" ]; then
            echo "Creating backup for $PG_SERVER..."
            az postgres flexible-server backup create \
              --resource-group $RG_PROD \
              --name $PG_SERVER \
              --backup-name $BACKUP_NAME || echo "⚠️ Backup creation skipped"

            echo "✅ Backup created: $BACKUP_NAME"
          else
            echo "⚠️ No PostgreSQL server found in $RG_PROD - backup skipped"
          fi

  build:
    name: Build & Push Images
    needs: backup
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ env.VERSION }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}

      - name: Azure login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name cracaindev

      - name: Build and push msim-api
        run: |
          docker build -t $ACR/msim-api:$VERSION -f services/msim-api/Dockerfile .
          docker push $ACR/msim-api:$VERSION
          echo "✅ msim-api:$VERSION pushed"

      - name: Build and push convergence-engine
        run: |
          docker build -t $ACR/convergence-engine:$VERSION -f services/convergence-engine/Dockerfile .
          docker push $ACR/convergence-engine:$VERSION
          echo "✅ convergence-engine:$VERSION pushed"

      - name: Build and push geoswarm-api
        run: |
          docker build -t $ACR/geoswarm-api:$VERSION -f services/geoswarm-api/Dockerfile .
          docker push $ACR/geoswarm-api:$VERSION
          echo "✅ geoswarm-api:$VERSION pushed"

  deploy-green:
    name: Deploy Green Revision
    needs: build
    runs-on: ubuntu-latest
    outputs:
      green_url: ${{ steps.deploy.outputs.green_url }}
      green_revision: ${{ steps.deploy.outputs.green_revision }}
    steps:
      - name: Azure login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy green revision (msim-api)
        id: deploy
        run: |
          echo "🟢 Deploying green revision..."

          # Create new revision with suffix
          REVISION_SUFFIX="green-$(echo $VERSION | tr -d 'v.')"

          # Update container app with new revision
          az containerapp update \
            --name ca-msim-api-prod \
            --resource-group $RG_PROD \
            --image $ACR/msim-api:$VERSION \
            --revision-suffix $REVISION_SUFFIX \
            --set-env-vars VERSION=$VERSION \
            --output none

          # Get the revision name and FQDN
          REVISION_NAME=$(az containerapp revision list \
            --name ca-msim-api-prod \
            --resource-group $RG_PROD \
            --query "[?properties.trafficWeight==0 && contains(name, '$REVISION_SUFFIX')].name | [0]" -o tsv)

          GREEN_URL=$(az containerapp show \
            --name ca-msim-api-prod \
            --resource-group $RG_PROD \
            --query properties.configuration.ingress.fqdn -o tsv)

          echo "green_url=https://$GREEN_URL" >> $GITHUB_OUTPUT
          echo "green_revision=$REVISION_NAME" >> $GITHUB_OUTPUT
          echo "✅ Green revision deployed: $REVISION_NAME"

      - name: Wait for green revision to be ready
        run: |
          echo "⏳ Waiting for green revision to be ready..."
          for i in {1..30}; do
            if curl -sf "${{ steps.deploy.outputs.green_url }}/health/live" > /dev/null; then
              echo "✅ Green revision is ready"
              exit 0
            fi
            echo "  Attempt $i/30 - waiting..."
            sleep 10
          done
          echo "::error::Green revision failed to become ready"
          exit 1

  smoke-test-green:
    name: Smoke Test Green Revision
    needs: deploy-green
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        run: |
          RESPONSE=$(curl -sf ${{ needs.deploy-green.outputs.green_url }}/health/ready)
          echo "$RESPONSE" | jq .

          STATUS=$(echo "$RESPONSE" | jq -r '.status')
          if [ "$STATUS" != "ok" ]; then
            echo "::error::Health check failed"
            exit 1
          fi
          echo "✅ Health check passed"

      - name: API smoke tests
        run: |
          # Test mines endpoint
          curl -sf -H "Authorization: Bearer ${{ secrets.PROD_API_KEY }}" \
            ${{ needs.deploy-green.outputs.green_url }}/mines?page=1&limit=1 | jq . || echo "⚠️ Mines endpoint test skipped"

          echo "✅ API smoke tests passed"

      - name: Circuit breaker health
        run: |
          RESPONSE=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.METRICS_API_KEY }}" \
            ${{ needs.deploy-green.outputs.green_url }}/health/metrics 2>/dev/null || echo '{}')

          echo "$RESPONSE" | jq '.circuit_breakers' || echo "⚠️ Circuit breaker metrics not available"

  shift-traffic:
    name: Shift Traffic (${{ inputs.traffic_percentage }}%)
    needs: [smoke-test-green, deploy-green]
    runs-on: ubuntu-latest
    steps:
      - name: Azure login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Route traffic to green revision
        run: |
          PERCENTAGE=${{ inputs.traffic_percentage }}
          GREEN_REVISION="${{ needs.deploy-green.outputs.green_revision }}"

          echo "🔀 Routing ${PERCENTAGE}% traffic to green revision..."

          # Set traffic weights
          az containerapp ingress traffic set \
            --name ca-msim-api-prod \
            --resource-group $RG_PROD \
            --revision-weight latest-revision=$((100-PERCENTAGE)) $GREEN_REVISION=$PERCENTAGE \
            --output none

          echo "✅ ${PERCENTAGE}% traffic routed to green revision"

      - name: Monitor for 5 minutes
        run: |
          echo "📊 Monitoring for 5 minutes..."
          GREEN_URL="${{ needs.deploy-green.outputs.green_url }}"

          for i in {1..30}; do
            METRICS=$(curl -sf \
              -H "Authorization: Bearer ${{ secrets.METRICS_API_KEY }}" \
              "$GREEN_URL/health/metrics" 2>/dev/null || echo '{}')

            ERROR_RATE=$(echo "$METRICS" | jq -r '.error_rate // 0' 2>/dev/null || echo "0")
            echo "  [$i/30] Error rate: $ERROR_RATE%"

            if (( $(echo "$ERROR_RATE > 5" | bc -l 2>/dev/null || echo 0) )); then
              echo "::error::Error rate exceeded 5%"
              exit 1
            fi

            sleep 10
          done
          echo "✅ Monitoring passed"

  swap-revisions:
    name: Complete Rollout (100%)
    needs: [shift-traffic, deploy-green]
    runs-on: ubuntu-latest
    if: inputs.traffic_percentage == '100'
    steps:
      - name: Azure login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set green revision to 100% traffic
        run: |
          GREEN_REVISION="${{ needs.deploy-green.outputs.green_revision }}"

          echo "🔄 Setting green revision to 100% traffic..."

          az containerapp ingress traffic set \
            --name ca-msim-api-prod \
            --resource-group $RG_PROD \
            --revision-weight $GREEN_REVISION=100 \
            --output none

          echo "✅ Green revision now receiving 100% traffic"

      - name: Deactivate old revisions
        run: |
          echo "🧹 Deactivating old revisions..."

          # List all revisions except the current green one
          OLD_REVISIONS=$(az containerapp revision list \
            --name ca-msim-api-prod \
            --resource-group $RG_PROD \
            --query "[?properties.active && name!='${{ needs.deploy-green.outputs.green_revision }}'].name" -o tsv)

          for REV in $OLD_REVISIONS; do
            echo "Deactivating $REV..."
            az containerapp revision deactivate \
              --name ca-msim-api-prod \
              --resource-group $RG_PROD \
              --revision $REV \
              --output none || echo "⚠️ Failed to deactivate $REV"
          done

          echo "✅ Old revisions deactivated"

      - name: Verify production
        run: |
          sleep 30

          GREEN_URL="${{ needs.deploy-green.outputs.green_url }}"
          RESPONSE=$(curl -sf "$GREEN_URL/health/ready")
          STATUS=$(echo "$RESPONSE" | jq -r '.status')

          if [ "$STATUS" != "ok" ]; then
            echo "::error::Production health check failed"
            exit 1
          fi

          echo "✅ Production verified - 100% on green revision"

  tag-release:
    name: Tag GitHub Release
    needs: [swap-revisions]
    if: inputs.traffic_percentage == '100'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create $VERSION \
            --title "Release $VERSION" \
            --notes "Production deployment $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --verify-tag

          echo "✅ GitHub release created"

  rollback:
    name: Rollback (if failed)
    needs: [deploy-green, smoke-test-green, shift-traffic]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Azure login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Route all traffic back to previous revision
        run: |
          echo "🔙 Rolling back - routing 100% traffic to previous revision..."

          # Get the latest stable revision (before green)
          STABLE_REVISION=$(az containerapp revision list \
            --name ca-msim-api-prod \
            --resource-group $RG_PROD \
            --query "[?properties.active && !contains(name, 'green')].name | [0]" -o tsv)

          if [ -n "$STABLE_REVISION" ]; then
            az containerapp ingress traffic set \
              --name ca-msim-api-prod \
              --resource-group $RG_PROD \
              --revision-weight $STABLE_REVISION=100 \
              --output none

            echo "✅ Rollback complete - traffic restored to $STABLE_REVISION"
          else
            echo "::warning::No stable revision found for rollback"
          fi

      - name: Deactivate failed green revision
        run: |
          GREEN_REVISION="${{ needs.deploy-green.outputs.green_revision }}"

          if [ -n "$GREEN_REVISION" ]; then
            az containerapp revision deactivate \
              --name ca-msim-api-prod \
              --resource-group $RG_PROD \
              --revision $GREEN_REVISION \
              --output none || echo "⚠️ Failed to deactivate green revision"
          fi

      - name: Notify rollback
        run: |
          echo "::error::Deployment failed and was rolled back"
          echo "::error::Version: $VERSION"
          echo "::error::Check logs for details"
