name: Deploy Production — AfriXplore

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'apps/**'
      - 'packages/**'
      - 'infrastructure/bicep/**'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy all services'
        required: false
        default: 'false'

env:
  REGISTRY: crafrixplorestaging.azurecr.io
  RESOURCE_GROUP: afrixplore-rg
  ENVIRONMENT: staging

jobs:
  # ─── REQUIRE STAGING GREEN ──────────────────────────────────────────────────
  require-staging:
    name: Verify Staging Health
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Check staging health
        run: |
          FQDN=$(az containerapp show \
            --name "ca-scout-api-staging" \
            --resource-group "afrixplore-rg" \
            --query "properties.configuration.ingress.fqdn" \
            -o tsv 2>/dev/null || echo "")
          if [ -n "$FQDN" ]; then
            HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
              "https://${FQDN}/health" --max-time 20 || echo "000")
            echo "Health check: HTTP $HTTP"
            [ "$HTTP" = "200" ] && echo "OK" || echo "Starting up..."
          else
            echo "No Container Apps deployed yet - skipping"
          fi

  # ─── BUILD & PUSH ───────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [require-staging]
    strategy:
      fail-fast: false
      matrix:
        service:
          - scout-api
          - intelligence-api
          - msim-api
          - notification-service
          - payment-service
          - geospatial-worker
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name crafrixplorestaging

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./services/${{ matrix.service }}
          file: ./services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: NODE_ENV=production

  # ─── DEPLOY CONTAINER APPS ──────────────────────────────────────────────────
  deploy-container-apps:
    name: Deploy Container Apps
    runs-on: ubuntu-latest
    needs: [build-and-push]
    strategy:
      max-parallel: 2
      matrix:
        service:
          - name: scout-api
            app: ca-scout-api-staging
          - name: intelligence-api
            app: ca-intelligence-api-staging
          - name: msim-api
            app: ca-msim-api-staging
          - name: notification-service
            app: ca-notification-staging
          - name: payment-service
            app: ca-payment-staging
          - name: geospatial-worker
            app: ca-geo-worker-staging
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy ${{ matrix.service.name }}
        run: |
          az containerapp update \
            --name ${{ matrix.service.app }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ matrix.service.name }}:${{ github.sha }}

  # ─── DEPLOY TO VERCEL ───────────────────────────────────────────────────────
  deploy-vercel-production:
    name: Deploy Vercel Production
    runs-on: ubuntu-latest
    needs: [build-and-push]
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Platform Web to Vercel Production
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_PLATFORM }}
          vercel-args: '--prod'
          working-directory: apps/platform-web

      - name: Deploy Admin Web to Vercel Production
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}
          vercel-args: '--prod'
          working-directory: apps/admin-web

  # ─── SMOKE TESTS ────────────────────────────────────────────────────────────
  production-smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-container-apps, deploy-vercel-production]
    if: always()
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Health checks
        run: |
          sleep 30
          FAILED=0
          for APP in ca-scout-api-staging ca-intelligence-api-staging ca-msim-api-staging ca-payment-staging; do
            FQDN=$(az containerapp show \
              --name "$APP" \
              --resource-group "afrixplore-rg" \
              --query "properties.configuration.ingress.fqdn" \
              -o tsv 2>/dev/null || echo "")
            if [ -n "$FQDN" ]; then
              HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
                "https://${FQDN}/health" --max-time 20 || echo "000")
              echo "$APP → HTTP $HTTP"
              [ "$HTTP" = "200" ] || FAILED=$((FAILED+1))
            else
              echo "$APP → no FQDN (skipping)"
            fi
          done
          exit $FAILED
