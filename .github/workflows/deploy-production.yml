name: Deploy Production — AfriXplore

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy all services'
        required: false
        default: 'false'

env:
  REGISTRY: craafrixxploreproduction.azurecr.io
  RESOURCE_GROUP: rg-afrixplore-production-southafricanorth
  ENVIRONMENT: production

jobs:
  # ─── REQUIRE STAGING GREEN ──────────────────────────────────────────────────
  require-staging:
    name: Verify Staging Health
    runs-on: ubuntu-latest
    steps:
      - name: Check staging health
        run: curl -f https://staging-api.afrixplore.io/health || exit 1

  # ─── BUILD & PUSH ───────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Production Images
    runs-on: ubuntu-latest
    needs: [require-staging]
    strategy:
      matrix:
        service:
          - scout-api
          - intelligence-api
          - msim-api
          - notification-service
          - payment-service
          - geospatial-worker
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_PRODUCTION }}

      - name: Login to ACR
        run: az acr login --name craafrixxploreproduction

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./services/${{ matrix.service }}
          file: ./services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: NODE_ENV=production

  # ─── DEPLOY CONTAINER APPS ──────────────────────────────────────────────────
  deploy-container-apps:
    name: Blue/Green Deploy Container Apps
    runs-on: ubuntu-latest
    needs: [build-and-push]
    strategy:
      max-parallel: 2
      matrix:
        service:
          - name: scout-api
            app: ca-afrixplore-scout-api-production
          - name: intelligence-api
            app: ca-afrixplore-intelligence-api-production
          - name: msim-api
            app: ca-afrixplore-msim-api-production
          - name: notification-service
            app: ca-afrixplore-notification-production
          - name: payment-service
            app: ca-afrixplore-payment-production
          - name: geospatial-worker
            app: ca-afrixplore-geo-worker-production
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_PRODUCTION }}

      - name: Deploy ${{ matrix.service.name }}
        run: |
          az containerapp update \
            --name ${{ matrix.service.app }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ matrix.service.name }}:${{ github.sha }}

  # ─── DEPLOY TO VERCEL PRODUCTION ────────────────────────────────────────────
  deploy-vercel-production:
    name: Deploy Vercel Production
    runs-on: ubuntu-latest
    needs: [build-and-push]
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Platform Web to Vercel Production
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_PLATFORM }}
          vercel-args: '--prod'
          working-directory: apps/platform-web

      - name: Deploy Admin Web to Vercel Production
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}
          vercel-args: '--prod'
          working-directory: apps/admin-web

  # ─── PRODUCTION SMOKE TESTS ─────────────────────────────────────────────────
  production-smoke-tests:
    name: Production Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-container-apps, deploy-vercel-production]
    steps:
      - name: Health checks
        run: |
          sleep 60
          curl -f https://api.afrixplore.io/health || exit 1
          curl -f https://platform.afrixplore.io || exit 1

  # ─── NOTIFY ─────────────────────────────────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [production-smoke-tests]
    if: always()
    steps:
      - name: Slack notification
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "${{ needs.production-smoke-tests.result == 'success' && '🚀' || '🔥' }} AfriXplore Production Deploy: ${{ needs.production-smoke-tests.result }}\nCommit: ${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
