name: Deploy Production — AfriXplore

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'apps/**'
      - 'packages/**'
      - 'infrastructure/bicep/**'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy all services'
        required: false
        default: 'false'

env:
  REGISTRY: crafrixplorestaging.azurecr.io
  RESOURCE_GROUP: afrixplore-rg
  ENVIRONMENT: staging

jobs:
  # ─── REQUIRE STAGING GREEN ──────────────────────────────────────────────────
  require-staging:
    name: Verify Staging Health
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Check staging health
        run: |
          FQDN=$(az containerapp show \
            --name "ca-scout-api-staging" \
            --resource-group "afrixplore-rg" \
            --query "properties.configuration.ingress.fqdn" \
            -o tsv 2>/dev/null || echo "")
          if [ -n "$FQDN" ]; then
            HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
              "https://${FQDN}/health" --max-time 20 || echo "000")
            echo "Health check: HTTP $HTTP"
            [ "$HTTP" = "200" ] && echo "OK" || echo "Starting up..."
          else
            echo "No Container Apps deployed yet - skipping"
          fi

  # ─── PROVISION INFRASTRUCTURE ───────────────────────────────────────────────
  provision-infrastructure:
    name: Provision Infrastructure (Bicep)
    runs-on: ubuntu-latest
    needs: [require-staging]
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep — what-if first
        id: whatif
        # what-if is informational only — transient Azure errors should not block deploy
        continue-on-error: true
        run: |
          az deployment group what-if \
            --name "afrixplore-${{ github.sha }}" \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file infrastructure/bicep/main.bicep \
            --parameters environment=${{ env.ENVIRONMENT }} \
            2>&1 | tail -20

      - name: Deploy Bicep
        run: |
          az deployment group create \
            --name "afrixplore-${{ github.sha }}" \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file infrastructure/bicep/main.bicep \
            --parameters environment=${{ env.ENVIRONMENT }} \
            --mode Incremental \
            --no-prompt

      # Service Bus subscriptions are immutable after creation — create them once
      # via CLI with --if-not-exists semantics (az CLI ignores AlreadyExists).
      - name: Ensure Service Bus subscriptions exist (idempotent)
        run: |
          NS="sb-afrixplore-${{ env.ENVIRONMENT }}"
          RG="${{ env.RESOURCE_GROUP }}"
          create_sub() {
            local topic=$1 sub=$2 max=$3
            az servicebus topic subscription create \
              --namespace-name "$NS" --resource-group "$RG" \
              --topic-name "$topic" --name "$sub" \
              --dead-letter-on-message-expiration true \
              --default-message-time-to-live P7D \
              --lock-duration PT5M \
              --max-delivery-count "$max" \
              2>/dev/null || echo "  $topic/$sub already exists (skip)"
          }
          create_sub reports-ingested    geospatial-worker   5
          create_sub reports-ingested    ai-pipeline         5
          create_sub reports-ingested    notification-service 3
          create_sub anomaly-detected    notification-service 5
          create_sub payment-triggered   payment-service     3
          create_sub payment-triggered   notification-service 3
          create_sub mineral-assessed    intelligence-dpi    5

      # Role assignments require User Access Administrator on the Key Vault scope.
      # If the SP already has the role, this is a no-op; errors are suppressed.
      - name: Grant Container Apps access to Key Vault (idempotent)
        run: |
          KV_ID=$(az keyvault show \
            --name "kv-afrixplore-${{ env.ENVIRONMENT }}" \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query id -o tsv 2>/dev/null || echo "")
          if [ -z "$KV_ID" ]; then echo "Key Vault not found — skipping"; exit 0; fi

          ROLE_ID="4633458b-17de-408a-b874-0445c86b69e6"  # Key Vault Secrets User
          for APP in \
            ca-scout-api-${{ env.ENVIRONMENT }} \
            ca-intelligence-api-${{ env.ENVIRONMENT }} \
            ca-msim-api-${{ env.ENVIRONMENT }} \
            ca-notification-${{ env.ENVIRONMENT }} \
            ca-payment-${{ env.ENVIRONMENT }} \
            ca-ai-inference-${{ env.ENVIRONMENT }} \
            ca-geo-worker-${{ env.ENVIRONMENT }}; do
            PRINCIPAL=$(az containerapp show \
              --name "$APP" \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --query "identity.principalId" -o tsv 2>/dev/null || echo "")
            if [ -n "$PRINCIPAL" ]; then
              az role assignment create \
                --assignee-object-id "$PRINCIPAL" \
                --assignee-principal-type ServicePrincipal \
                --role "$ROLE_ID" \
                --scope "$KV_ID" \
                2>/dev/null || echo "  $APP role already assigned (skip)"
            fi
          done

  # ─── BUILD & PUSH ───────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [provision-infrastructure]
    strategy:
      fail-fast: false
      matrix:
        service:
          - scout-api
          - intelligence-api
          - msim-api
          - notification-service
          - payment-service
          - ai-inference
          - geospatial-worker
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name crafrixplorestaging

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./services/${{ matrix.service }}
          file: ./services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: NODE_ENV=production

  # ─── RUN DATABASE MIGRATIONS ────────────────────────────────────────────────
  run-migrations:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: [build-and-push]
    steps:
      - uses: actions/checkout@v4

      - name: Install psql client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Run migrations
        run: bash infrastructure/scripts/run-migrations.sh infrastructure/scripts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ─── DEPLOY CONTAINER APPS ──────────────────────────────────────────────────
  deploy-container-apps:
    name: Deploy Container Apps
    runs-on: ubuntu-latest
    needs: [build-and-push, run-migrations]
    strategy:
      max-parallel: 2
      matrix:
        service:
          - name: scout-api
            app: ca-scout-api-staging
            allowed_origins: "true"
          - name: intelligence-api
            app: ca-intelligence-api-staging
            allowed_origins: "true"
          - name: msim-api
            app: ca-msim-api-staging
            allowed_origins: "true"
          - name: notification-service
            app: ca-notification-staging
            allowed_origins: "false"
          - name: payment-service
            app: ca-payment-staging
            allowed_origins: "true"
          - name: ai-inference
            app: ca-ai-inference-staging
            allowed_origins: "false"
          - name: geospatial-worker
            app: ca-geo-worker-staging
            allowed_origins: "false"
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Container App secrets for ${{ matrix.service.app }}
        run: |
          # Base secrets — every service
          SECRETS="database-url=${{ secrets.DATABASE_URL }} \
            service-bus-conn=${{ secrets.SERVICE_BUS_CONNECTION_STRING }} \
            signalr-conn=${{ secrets.SIGNALR_CONNECTION_STRING }} \
            appinsights-conn=${{ secrets.APPINSIGHTS_CONNECTION_STRING }} \
            storage-conn=${{ secrets.AZURE_STORAGE_CONNECTION_STRING }} \
            momo-base-url=${{ secrets.MTN_MOMO_BASE_URL }}"

          # Service-specific secrets
          case "${{ matrix.service.name }}" in
            scout-api)
              SECRETS="$SECRETS \
                at-ussd-secret=${{ secrets.AT_USSD_SECRET }}"
              ;;
            intelligence-api)
              SECRETS="$SECRETS \
                stripe-secret-key=${{ secrets.STRIPE_SECRET_KEY }} \
                stripe-webhook-secret=${{ secrets.STRIPE_WEBHOOK_SECRET }}"
              ;;
            notification-service)
              SECRETS="$SECRETS \
                firebase-sa-json=${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}"
              ;;
          esac

          az containerapp secret set \
            --name ${{ matrix.service.app }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --secrets $SECRETS

      - name: Deploy ${{ matrix.service.name }}
        run: |
          # Base env vars — every service
          ENV_VARS="DATABASE_URL=secretref:database-url \
            SERVICE_BUS_CONNECTION_STRING=secretref:service-bus-conn \
            AZURE_SIGNALR_CONNECTION_STRING=secretref:signalr-conn \
            APPLICATIONINSIGHTS_CONNECTION_STRING=secretref:appinsights-conn \
            AZURE_STORAGE_CONNECTION_STRING=secretref:storage-conn \
            AZURE_STORAGE_ACCOUNT_NAME=${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }} \
            NODE_ENV=production"

          if [ "${{ matrix.service.allowed_origins }}" = "true" ]; then
            ENV_VARS="$ENV_VARS ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}"
          fi

          # Service-specific env vars
          case "${{ matrix.service.name }}" in
            scout-api)
              ENV_VARS="$ENV_VARS \
                AT_USSD_SECRET=secretref:at-ussd-secret"
              ;;
            intelligence-api)
              ENV_VARS="$ENV_VARS \
                STRIPE_SECRET_KEY=secretref:stripe-secret-key \
                STRIPE_WEBHOOK_SECRET=secretref:stripe-webhook-secret"
              ;;
            notification-service)
              ENV_VARS="$ENV_VARS \
                FIREBASE_SERVICE_ACCOUNT_JSON=secretref:firebase-sa-json"
              ;;
            payment-service)
              ENV_VARS="$ENV_VARS \
                MTN_MOMO_BASE_URL=secretref:momo-base-url"
              ;;
          esac

          az containerapp update \
            --name ${{ matrix.service.app }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ matrix.service.name }}:${{ github.sha }} \
            --set-env-vars $ENV_VARS

  # ─── DEPLOY TO VERCEL ───────────────────────────────────────────────────────
  deploy-vercel-production:
    name: Deploy Vercel Production
    runs-on: ubuntu-latest
    needs: [build-and-push]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Platform Web to Vercel Production
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_PLATFORM }}
          vercel-args: '--prod'
          working-directory: apps/platform-web

      - name: Deploy Admin Web to Vercel Production
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}
          vercel-args: '--prod'
          working-directory: apps/admin-web

  # ─── HEALTH CHECKS ──────────────────────────────────────────────────────────
  post-deploy-health:
    name: Post-Deploy Health Checks
    runs-on: ubuntu-latest
    needs: [deploy-container-apps]
    outputs:
      scout_fqdn: ${{ steps.fqdns.outputs.scout_fqdn }}
      intelligence_fqdn: ${{ steps.fqdns.outputs.intelligence_fqdn }}
      msim_fqdn: ${{ steps.fqdns.outputs.msim_fqdn }}
      payment_fqdn: ${{ steps.fqdns.outputs.payment_fqdn }}
      notification_fqdn: ${{ steps.fqdns.outputs.notification_fqdn }}
      ai_inference_fqdn: ${{ steps.fqdns.outputs.ai_inference_fqdn }}
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Wait for container apps to stabilise
        run: sleep 45

      - name: Resolve FQDNs
        id: fqdns
        run: |
          for PAIR in \
            "ca-scout-api-staging:scout_fqdn" \
            "ca-intelligence-api-staging:intelligence_fqdn" \
            "ca-msim-api-staging:msim_fqdn" \
            "ca-payment-staging:payment_fqdn" \
            "ca-notification-staging:notification_fqdn" \
            "ca-ai-inference-staging:ai_inference_fqdn"; do
            APP="${PAIR%%:*}"
            KEY="${PAIR##*:}"
            FQDN=$(az containerapp show \
              --name "$APP" \
              --resource-group "afrixplore-rg" \
              --query "properties.configuration.ingress.fqdn" \
              -o tsv 2>/dev/null || echo "")
            echo "${KEY}=${FQDN}" >> "$GITHUB_OUTPUT"
            echo "$APP → $FQDN"
          done

      - name: Health checks — all HTTP services
        run: |
          FAILED=0
          declare -A ENDPOINTS=(
            [scout-api]="https://${{ steps.fqdns.outputs.scout_fqdn }}/health"
            [intelligence-api]="https://${{ steps.fqdns.outputs.intelligence_fqdn }}/health"
            [msim-api]="https://${{ steps.fqdns.outputs.msim_fqdn }}/health"
            [payment-service]="https://${{ steps.fqdns.outputs.payment_fqdn }}/health"
            [notification-service]="https://${{ steps.fqdns.outputs.notification_fqdn }}/health"
            [ai-inference]="https://${{ steps.fqdns.outputs.ai_inference_fqdn }}/health"
          )
          for SVC in "${!ENDPOINTS[@]}"; do
            URL="${ENDPOINTS[$SVC]}"
            if [ -n "${URL//https:\/\//}" ] && [ "${URL}" != "https:///health" ]; then
              HTTP=$(curl -sf -o /dev/null -w "%{http_code}" "$URL" --max-time 20 || echo "000")
              echo "$SVC → $HTTP"
              if [ "$HTTP" != "200" ]; then
                echo "::error::Health check FAILED for $SVC (HTTP $HTTP)"
                FAILED=$((FAILED+1))
              fi
            else
              echo "$SVC → no FQDN, skipping"
            fi
          done
          exit $FAILED

  # ─── PILL TESTS ─────────────────────────────────────────────────────────────
  pill-tests:
    name: Pill Tests — Synthetic Verification
    runs-on: ubuntu-latest
    needs: [post-deploy-health, deploy-vercel-production]
    if: always() && needs.post-deploy-health.result == 'success'
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── Test 1: Unauthenticated request → 401 ──────────────────────────────
      - name: Pill — auth guard (expect 401)
        run: |
          FQDN="${{ needs.post-deploy-health.outputs.intelligence_fqdn }}"
          if [ -z "$FQDN" ]; then echo "No FQDN, skipping"; exit 0; fi
          HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
            "https://${FQDN}/api/v1/clusters" --max-time 20 || echo "000")
          echo "Unauthenticated clusters → HTTP $HTTP"
          if [ "$HTTP" != "401" ]; then
            echo "::error::Expected 401, got $HTTP — auth guard may be broken"
            exit 1
          fi

      # ── Test 2: Zod validation → 400 on bad payload ────────────────────────
      - name: Pill — Zod validation (expect 400)
        run: |
          FQDN="${{ needs.post-deploy-health.outputs.intelligence_fqdn }}"
          if [ -z "$FQDN" ]; then echo "No FQDN, skipping"; exit 0; fi
          HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
            "https://${FQDN}/api/v1/clusters?min_dpi=notanumber" \
            -H "Authorization: Bearer invalid-token" \
            --max-time 20 || echo "000")
          echo "Invalid query param → HTTP $HTTP"
          # 401 (auth before Zod) or 400 (Zod fires) both confirm the pipeline works
          if [ "$HTTP" != "400" ] && [ "$HTTP" != "401" ]; then
            echo "::error::Expected 400 or 401, got $HTTP"
            exit 1
          fi

      # ── Test 3: USSD open route (no auth required) ─────────────────────────
      - name: Pill — USSD endpoint open (expect 200)
        run: |
          FQDN="${{ needs.post-deploy-health.outputs.scout_fqdn }}"
          if [ -z "$FQDN" ]; then echo "No FQDN, skipping"; exit 0; fi
          HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
            -X POST "https://${FQDN}/scout/v1/ussd/callback" \
            -H "Content-Type: application/json" \
            --data '{"sessionId":"pill-test","phoneNumber":"+233000000000","text":""}' \
            --max-time 20 || echo "000")
          echo "USSD ping → HTTP $HTTP"
          # 200 = AT_USSD_SECRET unset → welcome screen
          # 400 = validation error (also fine)
          # 401 = secret set but no sig (expected in prod with secret configured)
          if [ "$HTTP" = "500" ] || [ "$HTTP" = "000" ]; then
            echo "::error::USSD route returned $HTTP — 5xx/timeout means broken"
            exit 1
          fi

      # ── Test 4: Stripe webhook (intelligence-api) — expect 400 missing sig ──
      - name: Pill — Stripe webhook open (expect 400, not 5xx)
        run: |
          FQDN="${{ needs.post-deploy-health.outputs.intelligence_fqdn }}"
          if [ -z "$FQDN" ]; then echo "No FQDN, skipping"; exit 0; fi
          HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
            -X POST "https://${FQDN}/webhooks/stripe" \
            -H "Content-Type: application/json" \
            --data '{"type":"pill.test"}' \
            --max-time 20 || echo "000")
          echo "Stripe webhook ping → HTTP $HTTP"
          # 400 = route reachable, signature missing (expected)
          # 503 = STRIPE_WEBHOOK_SECRET not configured yet (acceptable)
          if [ "$HTTP" = "500" ] || [ "$HTTP" = "000" ] || [ "$HTTP" = "404" ]; then
            echo "::error::Stripe webhook returned $HTTP — route missing or crashed"
            exit 1
          fi

      # ── Test 5: Rate limiting — 429 after burst ───────────────────────────
      - name: Pill — rate limiter responds (expect eventual 429)
        run: |
          FQDN="${{ needs.post-deploy-health.outputs.scout_fqdn }}"
          if [ -z "$FQDN" ]; then echo "No FQDN, skipping"; exit 0; fi
          GOT_429=0
          for i in $(seq 1 10); do
            HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
              -X POST "https://${FQDN}/scout/v1/auth/otp/initiate" \
              -H "Content-Type: application/json" \
              --data '{"phone":"+233000000000"}' \
              --max-time 10 || echo "000")
            if [ "$HTTP" = "429" ]; then
              GOT_429=1
              echo "Rate limiter fired at attempt $i ✓"
              break
            fi
          done
          if [ "$GOT_429" = "0" ]; then
            echo "::warning::Rate limiter did not fire after 10 rapid OTP requests — review limits"
          fi

  # ─── FINAL SMOKE TESTS (full suite) ─────────────────────────────────────────
  production-smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [pill-tests, deploy-vercel-production]
    if: always()
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Health summary
        run: |
          FAILED=0
          for APP in ca-ai-inference-staging ca-scout-api-staging ca-intelligence-api-staging ca-msim-api-staging ca-payment-staging ca-notification-staging; do
            FQDN=$(az containerapp show \
              --name "$APP" \
              --resource-group "afrixplore-rg" \
              --query "properties.configuration.ingress.fqdn" \
              -o tsv 2>/dev/null || echo "")
            if [ -n "$FQDN" ]; then
              HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
                "https://${FQDN}/health" --max-time 20 || echo "000")
              echo "$APP → HTTP $HTTP"
              [ "$HTTP" = "200" ] || FAILED=$((FAILED+1))
            else
              echo "$APP → no FQDN (skipping)"
            fi
          done
          exit $FAILED
