services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_DB: ain
      POSTGRES_USER: ainuser
      POSTGRES_PASSWORD: localdevpassword
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ainuser -d ain"]
      interval: 10s
      timeout: 5s
      retries: 5

  msim-api:
    build:
      context: .
      dockerfile: services/msim-api/Dockerfile
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      MSIM_API_PORT: "3002"
      AZURE_POSTGRESQL_CONNECTION_STRING: postgresql://ainuser:localdevpassword@postgres:5432/ain?sslmode=disable
      AZURE_ENTRA_TENANT_ID: ${AZURE_ENTRA_TENANT_ID}
      AZURE_ENTRA_CLIENT_ID: ${AZURE_ENTRA_CLIENT_ID}
      AZURE_AI_SEARCH_ENDPOINT: ${AZURE_AI_SEARCH_ENDPOINT:-}
      AZURE_AI_SEARCH_KEY: ${AZURE_AI_SEARCH_KEY:-}
      AZURE_AI_SEARCH_INDEX_NAME: ${AZURE_AI_SEARCH_INDEX_NAME:-mines-index}
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:3001"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
